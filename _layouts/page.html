<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title }} | {{ site.title }}</title>
  <meta name="description" content="{{ site.description }}">
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/portfolio.css">
</head>
<body>

  <nav class="navbar scrolled" id="navbar">
    <div class="nav-container">
      <a href="/" class="nav-logo">AL</a>
      <ul class="nav-links" id="navLinks">
        <li><a href="/#about">About</a></li>
        <li><a href="/#projects">Projects</a></li>
        <li><a href="/#blog">Blog</a></li>
        <li><a href="/#contact">Contact</a></li>
        <li><a href="{{ site.resume_url }}" class="nav-resume" target="_blank" rel="noopener">Resume ↗</a></li>
      </ul>
      <button class="nav-toggle" id="navToggle" aria-label="Toggle navigation menu">
        <span></span><span></span><span></span>
      </button>
    </div>
  </nav>

  <main style="padding-top: calc(var(--nav-h) + 60px); padding-bottom: 80px;">
    <div class="container">
      <h1 class="post-title" style="margin-bottom: 32px;">{{ page.title }}</h1>
      {{ content }}
    </div>
  </main>

  <footer class="footer">
    <p>© {{ site.time | date: "%Y" }} {{ site.title }}</p>
  </footer>

  <script>
    const navToggle = document.getElementById('navToggle');
    const navLinks  = document.getElementById('navLinks');
    navToggle.addEventListener('click', function () {
      const isOpen = navLinks.classList.toggle('open');
      navToggle.classList.toggle('active', isOpen);
      navToggle.setAttribute('aria-expanded', isOpen);
    });
  </script>

</body>
</html>
