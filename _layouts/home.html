<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>{{ site.title }}</title>
  <meta name="description" content="{{ site.description }}">
  <meta name="author" content="{{ site.author }}">

  <!-- Open Graph -->
  <meta property="og:type"        content="website">
  <meta property="og:title"       content="{{ site.title }}">
  <meta property="og:description" content="{{ site.description }}">
  <meta property="og:url"         content="{{ site.url }}">
  <meta property="og:image"       content="{{ site.url }}{{ site.avatar_image }}">

  <!-- Twitter Card -->
  <meta name="twitter:card"        content="summary_large_image">
  <meta name="twitter:title"       content="{{ site.title }}">
  <meta name="twitter:description" content="{{ site.description }}">
  <meta name="twitter:image"       content="{{ site.url }}{{ site.avatar_image }}">

  <!-- Favicon -->
  <link rel="icon" type="image/x-icon" href="/favicon.ico">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="/assets/css/portfolio.css">

  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-H0QYL3FJL5"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-H0QYL3FJL5');
  </script>
</head>

<body>

  <!-- ╔══════════════════════════════════════╗
       ║              NAVBAR                  ║
       ╚══════════════════════════════════════╝ -->
  <nav class="navbar" id="navbar">
    <div class="nav-container">

      <a href="/" class="nav-logo">AL</a>

      <ul class="nav-links" id="navLinks">
        <li><a href="#about">About</a></li>
        <li><a href="#projects">Projects</a></li>
        <li><a href="#blog">Blog</a></li>
        <li><a href="#contact">Contact</a></li>
        <li>
          <a href="{{ site.resume_url }}" class="nav-resume" target="_blank" rel="noopener">
            Resume ↗
          </a>
        </li>
      </ul>

      <button class="nav-toggle" id="navToggle" aria-label="Toggle navigation menu">
        <span></span>
        <span></span>
        <span></span>
      </button>

    </div>
  </nav>

  <!-- ╔══════════════════════════════════════╗
       ║              CONTENT                 ║
       ╚══════════════════════════════════════╝ -->
  <main>
    {{ content }}
  </main>

  <!-- ╔══════════════════════════════════════╗
       ║              FOOTER                  ║
       ╚══════════════════════════════════════╝ -->
  <footer class="footer">
    <p>© {{ site.time | date: "%Y" }} {{ site.title }}</p>
  </footer>

  <!-- ╔══════════════════════════════════════╗
       ║              SCRIPTS                 ║
       ╚══════════════════════════════════════╝ -->
  <script>
    // ── Navbar: add shadow/blur when scrolled ──────────────────────
    const navbar = document.getElementById('navbar');
    window.addEventListener('scroll', function () {
      navbar.classList.toggle('scrolled', window.scrollY > 60);
    }, { passive: true });

    // ── Mobile menu toggle ─────────────────────────────────────────
    const navToggle = document.getElementById('navToggle');
    const navLinks  = document.getElementById('navLinks');

    navToggle.addEventListener('click', function () {
      const isOpen = navLinks.classList.toggle('open');
      navToggle.classList.toggle('active', isOpen);
      navToggle.setAttribute('aria-expanded', isOpen);
    });

    // Close menu when a link is clicked
    navLinks.querySelectorAll('a').forEach(function (link) {
      link.addEventListener('click', function () {
        navLinks.classList.remove('open');
        navToggle.classList.remove('active');
        navToggle.setAttribute('aria-expanded', 'false');
      });
    });

    // ── Scroll-triggered fade-in ───────────────────────────────────
    if ('IntersectionObserver' in window) {
      var observer = new IntersectionObserver(function (entries) {
        entries.forEach(function (entry) {
          if (entry.isIntersecting) {
            entry.target.classList.add('visible');
            observer.unobserve(entry.target);
          }
        });
      }, { threshold: 0.08 });

      document.querySelectorAll('.fade-in').forEach(function (el) {
        observer.observe(el);
      });
    } else {
      // Fallback for older browsers
      document.querySelectorAll('.fade-in').forEach(function (el) {
        el.classList.add('visible');
      });
    }
  </script>

</body>
</html>
